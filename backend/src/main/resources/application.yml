spring:
  application:
    name: wenda-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_ENABLED:true}
    path: /swagger-ui.html

wenda:
  request:
    header:
      request-id: X-Request-Id
      idempotency-key: Idempotency-Key
      if-match: If-Match
      accept-language: Accept-Language
    # requestId 长度上限，超出截断
    request-id-max-len: 64
  jwt:
    issuer: ${JWT_ISSUER:wenda.local}
    secret: ${JWT_SECRET:change_me_to_a_32_byte_random_string_at_least_please_xx}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
  audit:
    enabled: ${AUDIT_ENABLED:true}
  idempotency:
    enabled: ${IDEMPOTENCY_ENABLED:true}
    ttl-seconds: 86400
  adapter:
    ai-provider: ${AI_PROVIDER_DEFAULT:disabled}
    storage: ${STORAGE_ADAPTER_DEFAULT:local}
    scanner: ${SCANNER_ADAPTER_DEFAULT:disabled}
    renderer: ${RENDERER_ADAPTER_DEFAULT:disabled}
    email: ${EMAIL_ADAPTER_DEFAULT:disabled}
  security:
    prod-mock-disabled: ${PROD_MOCK_DISABLED:true}

logging:
  level:
    root: INFO
    com.wenda: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"
