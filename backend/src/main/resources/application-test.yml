spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:wenda_test}?currentSchema=${DB_SCHEMA:public}
    username: ${DB_USER:wenda}
    password: ${DB_PASSWORD:change_me}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      pool-name: wenda-hikari-test
  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
